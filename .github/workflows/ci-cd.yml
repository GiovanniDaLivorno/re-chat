name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Lint & Test (frontend + backend)
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js (frontend only)
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python (backend only)
        if: matrix.service == 'backend'
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            cd frontend && npm ci
          else
            cd backend && python -m pip install --upgrade pip && pip install -r requirements.txt
          fi

      - name: Run linter / tests
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            cd frontend && npm run lint && npm test || echo "No frontend tests defined"
          else
            cd backend && pytest || echo "No backend tests defined"
          fi

  # Build & push Docker images
  docker:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy with approval
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: production          # must match environment in GitHub settings
      reviewers:                # optional: can override environment reviewers
        - GitHubUser1
        - GitHubUser2
    steps:
      - name: Deploy to production
        run: |
          echo "🚀 Deployment approved!"
          echo "Frontend image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest"
          echo "Backend image:  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest"
          # Example: ssh user@server "docker-compose pull && docker-compose up -d"