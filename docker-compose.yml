services:
  rc-be:
    build:
      context: ./backend
    container_name: rc-be
    restart: unless-stopped
    networks:
      - nai
    expose:
      - "1000"
    environment:
      - HOST=0.0.0.0
      - PORT=1000
      - OLLAMA_BASE_URL=http://molly:11434
    command:
      - sh
      - -c
      - uvicorn main:app --host ${HOST:-0.0.0.0} --port ${PORT:-1000} --workers 4

  rc-wfe:
    build:
      context: ./frontend
    container_name: rc-wfe
    restart: unless-stopped
    depends_on:
      - rc-be
    ports:
      - "3000:80"
    networks:
      - nai

networks:
  nai:
    # external: true

