server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets
    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve all other requests with index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
